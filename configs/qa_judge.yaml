# QA + Judge pipeline (data already ingested into memsense)
#
# Usage:
#   cd memsense-eval
#   .venv/bin/python -m memsense_eval configs/qa_judge.yaml

resources:
  - name: locomo_reader
    config:
      filter_category: "5"

  - name: memsense_qa
    config:
      mode: "http"  # "http" or "cli" - HTTP mode with gateway
      base_url: "http://127.0.0.1:18789"
      token: "3876434efb9df238219cd49bba25d0102a2e99cef20944c8"
      max_retries: 3
      base_delay: 2.0
      timeout: 300
      output_dir: "output"
      # CLI mode params (if mode: "cli"):
      # agent_id: "main"

  - name: response_filter

  - name: llm_judge
    config:
      # DeepSeek (previous)
      # model: "deepseek-chat"
      # base_url: "https://api.deepseek.com"
      # api_key: "sk-bd624bd8e4be42a9bf1a873287c447cf"

      # Volcengine Ark (Doubao)
      model: "doubao-1-5-pro-32k-250115"
      base_url: "https://ark.cn-beijing.volces.com/api/v3"
      api_key: "b3a3e50e-0ae3-4590-b0bc-029667b8ffdd"
      concurrency: 5
      cache_dir: ".cache/judge"
      max_retries: 5
      base_delay: 0.5
      max_delay: 10.0

  - name: metrics_summary
    config:
      output_dir: "output"
      task_name: "qa_judge"

data:
  benchmark:
    data_path: "./data/locomo10_small.json"
    user_prefix: "eval"

flows:
  - use: locomo_reader
    by: [benchmark.data_path]
    obtain: [benchmark.samples]

  # Skip ingest — go directly to QA (assumes data already ingested)
  - use: memsense_qa
    by: [benchmark.samples.~0]
    obtain: [benchmark.samples.~0.qa_results]

  - use: response_filter
    by: [benchmark.samples.~0.qa_results]
    obtain: [benchmark.samples.~0.filtered_results]

  - use: llm_judge
    by: [benchmark.samples.~0.filtered_results]
    obtain: [benchmark.samples.~0.grades]

  - use: metrics_summary
    by: [benchmark.samples]
    obtain: [benchmark.summary]
    reuse: true
