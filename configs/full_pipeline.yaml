# Full evaluation pipeline: ingest → QA → filter → judge → summary
#
# Usage:
#   cd memsense-eval
#   .venv/bin/python -m memsense_eval configs/full_pipeline.yaml

resources:
  - name: locomo_reader
    config:
      filter_category: "5"

  - name: memsense_ingest
    config:
      base_url: "http://127.0.0.1:8787"
      max_chunk_size: 4000
      concurrency: 3
      max_retries: 3
      base_delay: 2.0
      user_prefix: "memsense_test_eval"

  - name: embedding_wait
    config:
      db_url: "postgresql://127.0.0.1:5432/memsense"
      poll_interval: 30.0       # fallback only; real wakeup via LISTEN/NOTIFY
      timeout: 300.0

  - name: memsense_qa
    config:
      mode: "http"
      base_url: "http://127.0.0.1:18789"
      token: "3876434efb9df238219cd49bba25d0102a2e99cef20944c8"
      max_retries: 3
      base_delay: 2.0
      timeout: 300
      output_dir: "output"
      user_prefix: "memsense_test_eval"
      # CLI mode (fallback):
      # mode: "cli"
      # agent_id: "main"

  - name: response_filter

  - name: llm_judge_single
    config:
      model: "doubao-1-5-pro-32k-250115"
      base_url: "https://ark.cn-beijing.volces.com/api/v3"
      api_key: "b3a3e50e-0ae3-4590-b0bc-029667b8ffdd"
      concurrency: 5
      cache_dir: ".cache/judge"
      max_retries: 5
      base_delay: 0.5
      max_delay: 10.0

  - name: metrics_summary
    config:
      output_dir: "output"
      task_name: "full_eval"

data:
  benchmark:
    data_path: "./data/locomo10_subset.json"
    user_prefix: "memsense_test_eval"

flows:
  # Step 1: Read LoCoMo data → structured samples
  - use: locomo_reader
    by: [benchmark.data_path]
    obtain: [benchmark.samples]

  # Step 2: Ingest each sample's conversations into memsense
  - use: memsense_ingest
    by: [benchmark.samples.~0]
    obtain: [benchmark.samples.~0.ingest_result]

  # Step 3: Wait for all embedding jobs to complete
  - use: embedding_wait
    by: [benchmark.samples.~0.ingest_result]
    obtain: [benchmark.samples.~0.embeddings_ready]

  # Step 4: Run QA for each ingested sample
  #   QA writes per-question results to sample["qa_item"][qi] during execution,
  #   enabling the judge to start as soon as each answer arrives.
  - use: memsense_qa
    by: [benchmark.samples.~0, benchmark.samples.~0.embeddings_ready]
    obtain: [benchmark.samples.~0.qa_results]

  # Step 5: Judge each question as it becomes available (streaming)
  - use: llm_judge_single
    by: [benchmark.samples.~0.qa_item.~1]
    obtain: [benchmark.samples.~0.grade.~1]

  # Step 6: Aggregate metrics (reuse = periodic re-check with live progress)
  - use: metrics_summary
    by: [benchmark.samples]
    obtain: [benchmark.summary]
    reuse: true
